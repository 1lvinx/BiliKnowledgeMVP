name: CI

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: macos-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: BiliKnowledgeApp/package-lock.json

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: BiliKnowledgeApp/src-tauri

      - name: Install frontend deps
        run: npm ci
        working-directory: BiliKnowledgeApp

      - name: Build frontend
        run: npm run build
        working-directory: BiliKnowledgeApp

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate
        working-directory: BiliKnowledgeApp

      - name: Run Rust tests
        run: cargo test
        working-directory: BiliKnowledgeApp/src-tauri

      - name: Run Python script tests
        run: |
          python3 BiliKnowledge/scripts/test_validate_knowledge_base.py
          python3 BiliKnowledge/scripts/test_update_processing_status.py
          python3 BiliKnowledge/scripts/extract_projects.py --self-test

      - name: Run repository hygiene checks
        run: python3 tools/check_repo_hygiene.py

      - name: Prepare empty knowledge base skeleton
        run: |
          mkdir -p \
            BiliKnowledge/notes/raw \
            BiliKnowledge/notes/reviewed \
            BiliKnowledge/projects \
            BiliKnowledge/reports
          test -f BiliKnowledge/index.md || cat > BiliKnowledge/index.md <<'EOF'
          # 哔知知识库

          这是 CI 使用的空知识库骨架。真实收藏、字幕、笔记和报告均保留在本地，不提交到仓库。
          EOF
          test -f BiliKnowledge/manifest/videos.json || printf '[]\n' > BiliKnowledge/manifest/videos.json

      - name: Validate knowledge base structure
        run: python3 BiliKnowledge/scripts/validate_knowledge_base.py --root BiliKnowledge

      - name: Compile Python scripts
        run: python3 -m compileall -q BiliKnowledge/scripts

      - name: Validate Chrome Companion
        run: |
          node -e "JSON.parse(require('fs').readFileSync('BiliKnowledgeCompanion/manifest.json','utf8')); console.log('manifest ok')"
          node --check BiliKnowledgeCompanion/background.js
          node --check BiliKnowledgeCompanion/content.js
          node --check BiliKnowledgeCompanion/popup.js

      - name: Scan tracked files for sensitive data
        run: python3 tools/scan_sensitive.py
