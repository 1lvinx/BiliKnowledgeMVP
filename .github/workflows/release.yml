name: Release

on:
  push:
    tags:
      - "v*"
      - "beta-rc-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x64
            platform: macos-latest
            args: --target x86_64-apple-darwin
          - name: macOS arm64
            platform: macos-latest
            args: --target aarch64-apple-darwin
          - name: Windows x64
            platform: windows-latest
            args: --bundles nsis
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: BiliKnowledgeApp/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: BiliKnowledgeApp/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install Windows system dependencies
        if: matrix.platform == 'windows-latest'
        run: choco install nsis -y

      - name: Install frontend dependencies
        run: npm ci
        working-directory: BiliKnowledgeApp

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: BiliKnowledgeApp
          tagName: ${{ github.ref_name }}
          releaseName: "哔知 ${{ github.ref_name }}"
          releaseBody: |
            哔知桌面安装包由 GitHub Actions 自动构建。

            注意：如果未配置平台签名/公证密钥，产物可能未签名，仅适合内测或源码构建用户。
          releaseDraft: true
          prerelease: ${{ startsWith(github.ref_name, 'beta-rc-') }}
          args: ${{ matrix.args }}
