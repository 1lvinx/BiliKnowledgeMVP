name: Release

on:
  push:
    tags:
      - "v*"
      - "beta-rc-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x64
            platform: macos-latest
            rustTarget: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: macOS arm64
            platform: macos-latest
            rustTarget: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: Windows x64
            platform: windows-latest
            rustTarget: ""
            args: --bundles nsis
          - name: Linux x64
            platform: ubuntu-22.04
            rustTarget: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: BiliKnowledgeApp/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: BiliKnowledgeApp/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install Windows system dependencies
        if: matrix.platform == 'windows-latest'
        run: choco install nsis -y

      - name: Install frontend dependencies
        run: npm ci
        working-directory: BiliKnowledgeApp

      - name: Build Tauri bundles
        run: npm run tauri build -- ${{ matrix.args }}
        working-directory: BiliKnowledgeApp

      - name: Normalize release asset names
        shell: bash
        env:
          MATRIX_NAME: ${{ matrix.name }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import shutil
          from pathlib import Path

          root = Path("BiliKnowledgeApp/src-tauri/target")
          out = Path("release-assets")
          out.mkdir(exist_ok=True)

          tag = os.environ["RELEASE_TAG"]
          platform = (
              os.environ["MATRIX_NAME"]
              .lower()
              .replace(" ", "-")
              .replace("macos", "macos")
          )

          suffixes = [".app.tar.gz", ".dmg", ".AppImage", ".deb", ".rpm", ".exe"]
          found = []

          for path in root.rglob("*"):
              if not path.is_file():
                  continue
              if "bundle" not in path.parts:
                  continue

              suffix = next((item for item in suffixes if path.name.endswith(item)), None)
              if suffix is None:
                  continue

              target = out / f"BiZhi-{tag}-{platform}{suffix}"
              if target.exists():
                  stem = target.name[: -len(suffix)]
                  target = out / f"{stem}-{len(found) + 1}{suffix}"
              shutil.copy2(path, target)
              found.append(target)

          if not found:
              raise SystemExit("No Tauri release assets found under BiliKnowledgeApp/src-tauri/target/**/bundle")

          print("Normalized release assets:")
          for item in found:
              print(f"- {item}")
          PY

      - name: Generate SHA256 checksums
        shell: bash
        env:
          MATRIX_NAME: ${{ matrix.name }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          platform="$(printf '%s' "$MATRIX_NAME" | tr '[:upper:] ' '[:lower:]-')"
          checksum_file="BiZhi-${RELEASE_TAG}-${platform}-SHA256SUMS.txt"
          (
            cd release-assets
            rm -f ./*SHA256SUMS.txt
            shasum -a 256 ./* > "$checksum_file"
            cat "$checksum_file"
          )

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          name: "哔知 ${{ github.ref_name }}"
          body: |
            哔知桌面安装包由 GitHub Actions 自动构建。

            安装包文件使用 `BiZhi-<tag>-<platform>` 英文前缀，避免中文产品名在不同平台打包时被清空或转义。

            每个平台会随安装包上传 `SHA256SUMS.txt` 校验文件。下载后可使用：

            ```bash
            shasum -a 256 -c BiZhi-<tag>-<platform>-SHA256SUMS.txt
            ```

            注意：如果未配置平台签名/公证密钥，产物可能未签名，仅适合内测或源码构建用户。
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'beta-rc-') || contains(github.ref_name, '-rc.') }}
          files: release-assets/*
